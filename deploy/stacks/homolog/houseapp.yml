version: '3.8'

networks:
  network_swarm_public:
    external: true

services:
  gate:
    image: ghcr.io/fagner3g/houseapp-homolog-gate:${TAG:-develop}
    environment:
      IDLE_MS: "600000"
      SCALE_SERVICES: houseapp-homolog_api,houseapp-homolog_web
      WEB_UPSTREAM_HOST: tasks.houseapp-homolog_web
      WEB_UPSTREAM_PORT: "80"
      API_UPSTREAM_HOST: tasks.houseapp-homolog_api
      API_UPSTREAM_PORT: "3333"
      WEB_PUBLIC_HOST: app.homolog.jarvis.dev.br
      API_PUBLIC_HOST: api.homolog.jarvis.dev.br
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 60s
      resources:
        limits:
          cpus: "0.10"
          memory: 64M
        reservations:
          cpus: "0.02"
          memory: 32M
      labels:
        - traefik.enable=true
        - traefik.http.routers.houseapp-api-hml.rule=Host(`api.homolog.jarvis.dev.br`)
        - traefik.http.routers.houseapp-api-hml.entrypoints=websecure
        - traefik.http.routers.houseapp-api-hml.tls.certresolver=letsencryptresolver
        - traefik.http.routers.houseapp-api-hml.service=houseapp-gate-hml
        - traefik.http.routers.houseapp-web-hml.rule=Host(`app.homolog.jarvis.dev.br`)
        - traefik.http.routers.houseapp-web-hml.entrypoints=websecure
        - traefik.http.routers.houseapp-web-hml.tls.certresolver=letsencryptresolver
        - traefik.http.routers.houseapp-web-hml.service=houseapp-gate-hml
        - traefik.http.services.houseapp-gate-hml.loadbalancer.server.port=8080
    networks:
      - network_swarm_public

  api:
    image: ghcr.io/fagner3g/houseapp-api:${TAG:-develop}
    env_file:
      - /opt/stacks/houseapp/homolog/api.env
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:3333/health || wget -qO- http://127.0.0.1:3333/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      replicas: 0
      update_config:
        order: start-first
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 60s
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 128M
    networks:
      - network_swarm_public

  web:
    image: ghcr.io/fagner3g/houseapp-web:${TAG:-develop}
    env_file:
      - /opt/stacks/houseapp/homolog/web.env
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1/health || wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      replicas: 0
      update_config:
        order: start-first
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 60s
      resources:
        limits:
          cpus: "0.50"
          memory: 384M
        reservations:
          cpus: "0.10"
          memory: 96M
    networks:
      - network_swarm_public
