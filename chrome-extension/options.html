<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>HouseApp — Configurações</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      color: #1e293b;
      background: #f8f9fc;
      padding: 24px;
      max-width: 480px;
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
      color: #1a1a2e;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 5px;
    }

    input, select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 13px;
      background: #fff;
      color: #1e293b;
      outline: none;
    }

    input:focus, select:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59,130,246,0.15);
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }

    .btn-save    { background: #3b82f6; color: #fff; }
    .btn-save:hover { background: #2563eb; }

    .btn-test    { background: #e2e8f0; color: #1e293b; }
    .btn-test:hover { background: #cbd5e1; }

    .btn-logout  { background: #fee2e2; color: #ef4444; }
    .btn-logout:hover { background: #fecaca; }

    #status {
      margin-top: 12px;
      font-size: 13px;
      min-height: 18px;
    }

    .status-ok  { color: #10b981; }
    .status-err { color: #ef4444; }
  </style>
</head>
<body>
  <h1>🏠 HouseApp — Configurações</h1>

  <div class="field">
    <label for="api-url">URL da API</label>
    <input type="url" id="api-url" placeholder="https://api.houseapp.com.br" />
  </div>

  <div class="field">
    <label for="web-url">URL do App Web</label>
    <input type="url" id="web-url" placeholder="https://app.houseapp.com.br" />
  </div>

  <div class="field">
    <label for="poll-minutes">Frequência de notificações</label>
    <select id="poll-minutes">
      <option value="15">A cada 15 minutos</option>
      <option value="30">A cada 30 minutos</option>
      <option value="60">A cada hora</option>
    </select>
  </div>

  <div class="actions">
    <button class="btn-save" id="btn-save">Salvar</button>
    <button class="btn-test" id="btn-test">Testar conexão</button>
    <button class="btn-logout" id="btn-logout">Desconectar</button>
  </div>

  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
